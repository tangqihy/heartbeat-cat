name: Build & Deploy Server

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Volcengine server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          API_KEY: ${{ secrets.API_KEY }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::warning::DEPLOY_HOST not configured, skipping deployment"
            exit 0
          fi

          DEPLOY_USER="${DEPLOY_USER:-root}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_CMD="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST"

          $SSH_CMD << ENDSSH
            set -e

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image
            docker pull $IMAGE_TAG

            # Create app directory if not exists
            mkdir -p ~/heartbeat-cat

            # Write docker-compose.yml
            cat > ~/heartbeat-cat/docker-compose.yml << 'COMPOSE'
          services:
            heartbeat:
              image: ${IMAGE_TAG}
              ports:
                - "3000:3000"
              volumes:
                - heartbeat-data:/data
              environment:
                - API_KEY=${API_KEY}
                - DATABASE_PATH=/data/heartbeat.db
                - NODE_ENV=production
              restart: unless-stopped

          volumes:
            heartbeat-data:
          COMPOSE

            # Write .env
            cat > ~/heartbeat-cat/.env << ENV
          IMAGE_TAG=$IMAGE_TAG
          API_KEY=$API_KEY
          ENV

            # Deploy
            cd ~/heartbeat-cat
            docker compose up -d

            # Cleanup old images
            docker image prune -f

            echo "Deployment complete: $IMAGE_TAG"
          ENDSSH
