<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
<title>Bongo Cat</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: transparent; overflow: hidden; user-select: none; }
body { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100vh; padding-bottom: 8px; }

.cats-row {
  display: flex; align-items: flex-end; gap: 0;
  -webkit-app-region: drag; cursor: grab;
}
.cats-row:active { cursor: grabbing; }

.cat-wrapper { position: relative; }

.cat-svg { transition: transform 0.08s ease-out; }
.cat-svg.bounce { transform: translateY(3px); }

.paw-left, .paw-right { transition: transform 0.07s ease-out; transform-origin: center bottom; }
.paw-left.tap  { transform: translateY(6px) scaleY(0.65) rotate(-4deg); }
.paw-right.tap { transform: translateY(6px) scaleY(0.65) rotate(4deg); }

.ear-left, .ear-right { transition: transform 0.1s ease-out; transform-origin: 50% 100%; }
.ear-left.wiggle  { transform: rotate(-18deg) translateY(-3px); }
.ear-right.wiggle { transform: rotate(18deg) translateY(-3px); }

.eye { transition: ry 0.1s ease-out; }
.eye.squint { ry: 2; }

/* Bottom bar */
.bottom-bar {
  display: flex; align-items: center; gap: 8px; margin-top: 4px;
  font-family: 'Segoe UI', sans-serif; font-size: 11px;
  color: rgba(255,255,255,0.8);
  -webkit-app-region: no-drag;
  cursor: default;
  width: 220px;
}
.counters { display: flex; gap: 10px; flex-shrink: 0; }
.counter { display: flex; align-items: center; gap: 3px; }
.counter-icon { font-size: 12px; }
.counter-num { font-variant-numeric: tabular-nums; min-width: 20px; font-weight: 600; font-size: 11px; }

.energy-wrap { flex: 1; display: flex; flex-direction: column; gap: 1px; }
.energy-bar-bg { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); overflow: hidden; }
.energy-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4fc3f7, #7c4dff); transition: width 0.4s ease; width: 0%; }
.energy-label { font-size: 9px; color: rgba(255,255,255,0.5); text-align: right; }

.box-area {
  flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 0;
  position: relative; -webkit-app-region: no-drag;
}
.box-btn {
  width: 26px; height: 26px; border: none; background: none;
  cursor: pointer; font-size: 18px; filter: grayscale(1) opacity(0.3);
  transition: all 0.3s; padding: 0;
  -webkit-app-region: no-drag; position: relative;
}
.box-btn.ready { filter: none; animation: boxPulse 1s infinite; }
.box-btn.cooldown { filter: grayscale(0.5) opacity(0.5); cursor: default; }
@keyframes boxPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

.box-badge {
  position: absolute; top: -4px; right: -6px;
  background: #ff5252; color: #fff; font-size: 8px; font-weight: 700;
  min-width: 13px; height: 13px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 2px; line-height: 1; pointer-events: none; font-family: 'Segoe UI', sans-serif;
}
.box-cooldown-label {
  font-size: 8px; color: rgba(255,255,255,0.5); font-family: 'Segoe UI', sans-serif;
  white-space: nowrap; margin-top: -1px;
}

/* Level badge */
.level-row {
  display: flex; align-items: center; gap: 4px; width: 220px; margin-top: 2px;
  font-family: 'Segoe UI', sans-serif;
  -webkit-app-region: no-drag; cursor: default;
}
.level-badge {
  font-size: 10px; font-weight: 700;
  color: #ffd54f; background: rgba(255,213,79,0.15);
  padding: 1px 5px; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0;
}
.xp-bar-bg { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
.xp-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #ffd54f, #ff8f00); transition: width 0.4s ease; width: 0%; }
.xp-label { font-size: 8px; color: rgba(255,255,255,0.4); white-space: nowrap; flex-shrink: 0; }

@keyframes levelUpFlash {
  0% { text-shadow: 0 0 8px #ffd54f, 0 0 16px #ff8f00; transform: scale(1.3); }
  100% { text-shadow: none; transform: scale(1); }
}
.level-badge.flash { animation: levelUpFlash 0.8s ease-out; }

/* Roadmap strip */
.roadmap-row {
  display: flex; align-items: center; gap: 3px; width: 220px; margin-top: 2px;
  -webkit-app-region: no-drag; cursor: default;
  font-family: 'Segoe UI', sans-serif;
}
.roadmap-box {
  width: 18px; height: 18px; border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all 0.3s;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0.6;
}
.roadmap-box.current {
  opacity: 1; transform: scale(1.2);
  border-color: rgba(255,255,255,0.5);
  box-shadow: 0 0 6px rgba(255,255,255,0.3);
}
.roadmap-box.next { opacity: 0.8; }

/* Resource mini bar */
.resource-row {
  display: flex; align-items: center; gap: 4px; width: 220px; margin-top: 2px;
  -webkit-app-region: no-drag; cursor: default;
  font-family: 'Segoe UI', sans-serif; font-size: 9px;
}
.resource-pip {
  display: flex; align-items: center; gap: 1px;
  color: rgba(255,255,255,0.7);
}
.resource-pip .r-icon { font-size: 10px; }
.resource-pip .r-val { font-variant-numeric: tabular-nums; min-width: 16px; font-weight: 600; }

/* Box open result overlay */
.box-result-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); z-index: 2000;
  pointer-events: auto; cursor: pointer;
}
.box-result-card {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: 12px; padding: 16px; text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  max-width: 200px;
  animation: boxReveal 0.5s ease-out;
}
@keyframes boxReveal {
  0% { transform: scale(0.3) rotateY(90deg); opacity: 0; }
  50% { transform: scale(1.1) rotateY(0deg); opacity: 1; }
  100% { transform: scale(1); }
}
.box-result-type {
  font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 4px;
  font-family: 'Segoe UI', sans-serif;
}
.box-result-items {
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.box-result-item-name {
  font-size: 13px; font-weight: 700; margin-top: 4px;
  font-family: 'Segoe UI', sans-serif;
}
.box-result-rarity {
  font-size: 9px; padding: 1px 6px; border-radius: 3px;
  display: inline-block; margin-top: 2px; font-weight: 600;
  font-family: 'Segoe UI', sans-serif;
}

/* Friend cat mini */
.friend-cat-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin: 0 -8px;
}
.friend-cat-name {
  font-family: 'Segoe UI', sans-serif; font-size: 9px;
  color: rgba(255,255,255,0.7); text-align: center;
  white-space: nowrap; max-width: 90px; overflow: hidden;
  text-overflow: ellipsis; margin-bottom: 1px;
  -webkit-app-region: no-drag;
}
.friend-cat-svg { transition: transform 0.08s ease-out; }
.friend-cat-svg.bounce { transform: translateY(2px); }

/* ── Animation state machine ── */
@keyframes blink { 0%,90%,100% { ry: 7; } 95% { ry: 1; } }
@keyframes tailWag { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
@keyframes zzzFloat { 0% { opacity:0; transform:translate(0,0) scale(0.7); } 30% { opacity:0.8; } 100% { opacity:0; transform:translate(8,-18) scale(1.1); } }
@keyframes sweatDrop { 0% { opacity:0; transform:translateY(0); } 30% { opacity:0.7; } 100% { opacity:0; transform:translateY(6px); } }
@keyframes starBurst { 0% { opacity:1; transform:scale(0.3); } 50% { opacity:1; transform:scale(1.2); } 100% { opacity:0; transform:scale(0.5) translateY(-15px); } }
@keyframes achieveBanner { 0% { transform:translateY(-40px); opacity:0; } 15% { transform:translateY(0); opacity:1; } 85% { transform:translateY(0); opacity:1; } 100% { transform:translateY(-40px); opacity:0; } }
@keyframes fishFly { 0% { transform:translate(-60px,20px) rotate(-30deg); opacity:0; } 20% { opacity:1; } 80% { opacity:1; } 100% { transform:translate(20px,-10px) rotate(10deg); opacity:0; } }
@keyframes heartFloat { 0% { opacity:0; transform:scale(0.3) translateY(0); } 30% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(0.8) translateY(-25px); } }

#tail { transform-origin: 150px 100px; animation: tailWag 2s ease-in-out infinite; }
.cat-state-sleepy #eyeL, .cat-state-sleepy #eyeR { ry: 3 !important; }
.cat-state-sleeping #eyeL, .cat-state-sleeping #eyeR { ry: 1.2 !important; }
.cat-state-sleepy .cat-svg, .cat-state-sleeping .cat-svg { transform: translateY(2px); }
.cat-state-fast #eyeL, .cat-state-fast #eyeR { ry: 8 !important; rx: 6 !important; }

.zzz-bubble { position:absolute; top:8px; right:20px; font-size:14px; pointer-events:none; display:none; }
.cat-state-sleepy .zzz-bubble, .cat-state-sleeping .zzz-bubble { display:block; }
.zzz-char { display:inline-block; animation: zzzFloat 2s ease-out infinite; }
.zzz-char:nth-child(2) { animation-delay:0.6s; font-size:12px; }
.zzz-char:nth-child(3) { animation-delay:1.2s; font-size:10px; }

.sweat-drop { display:none; }
.cat-state-fast .sweat-drop { display:block; animation: sweatDrop 0.8s ease-out infinite; }

.achieve-banner {
  position:fixed; top:4px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#ffd54f,#ff8f00); color:#333;
  padding:4px 14px; border-radius:10px; font:bold 12px 'Segoe UI',sans-serif;
  white-space:nowrap; z-index:1000; pointer-events:none;
  animation: achieveBanner 3s ease-in-out forwards;
  box-shadow:0 2px 10px rgba(255,213,79,0.5);
  -webkit-app-region:no-drag;
}

.interaction-anim { position:absolute; pointer-events:none; z-index:900; }
.fish-anim { font-size:24px; animation: fishFly 1.2s ease-out forwards; top:40%; left:30%; }
.heart-anim { font-size:18px; animation: heartFloat 1s ease-out forwards; }
.gift-anim { font-size:24px; animation: starBurst 1s ease-out forwards; top:30%; left:45%; }
</style>
</head>

<script>
const api = window.heartbeatAPI
let kbTotal = 0, msTotal = 0, nextPaw = 'left'
let dailyKb = 0, dailyMs = 0
let overlayUnlockConfig = null

function updateOverlayVisibility() {
  const tabs = overlayUnlockConfig?.tabs ?? {}
  const lvl = currentLevel ?? 1
  const roadmapMin = tabs.catalog ?? 3
  const resourceMin = tabs.resources ?? 5
  roadmapRow.style.display = lvl >= roadmapMin ? '' : 'none'
  resourceRow.style.display = lvl >= resourceMin ? '' : 'none'
}

;(async () => {
  try {
    overlayUnlockConfig = await api.bongoGetUnlockConfig()
  } catch {}
  updateOverlayVisibility()
})()

const catSvg  = document.getElementById('catSvg')
const pawL    = document.getElementById('pawL')
const pawR    = document.getElementById('pawR')
const earL    = document.getElementById('earL')
const earR    = document.getElementById('earR')
const eyeL    = document.getElementById('eyeL')
const eyeR    = document.getElementById('eyeR')
const kbEl    = document.getElementById('kbCount')
const msEl    = document.getElementById('msCount')
const wrapper = document.getElementById('catWrapper')
const catsRow = document.getElementById('catsRow')
const energyFill  = document.getElementById('energyFill')
const energyLabel = document.getElementById('energyLabel')
const boxBtn      = document.getElementById('boxBtn')

/* Window is always interactive — drag via -webkit-app-region: drag on .cats-row */

function tapPaw(side) {
  const paw = side === 'left' ? pawL : pawR
  paw.classList.add('tap')
  catSvg.classList.add('bounce')
  setTimeout(() => { paw.classList.remove('tap'); catSvg.classList.remove('bounce') }, 120)
}

function mouseReact() {
  earL.classList.add('wiggle'); earR.classList.add('wiggle')
  eyeL.classList.add('squint'); eyeR.classList.add('squint')
  setTimeout(() => {
    earL.classList.remove('wiggle'); earR.classList.remove('wiggle')
    eyeL.classList.remove('squint'); eyeR.classList.remove('squint')
  }, 160)
}

function fmt(n) {
  if (n >= 100000) return (n / 1000).toFixed(0) + 'k'
  if (n >= 10000) return (n / 1000).toFixed(1) + 'k'
  return String(n)
}

api.onDailyInputUpdate((data) => {
  dailyKb = data.keyboard
  dailyMs = data.mouse
  kbTotal = 0
  msTotal = 0
  kbEl.textContent = fmt(dailyKb)
  msEl.textContent = fmt(dailyMs)
})

/* ── Energy (optimistic client-first) ── */
let serverEnergy = 0
let serverProgress = 0
let energyPerBox = 1000
let pendingEnergy = 0

let openAllowance = 0
let energyBoxes = 0
let nextOpenIn = 0
let cooldownTickTimer = null

const boxBadge = document.getElementById('boxBadge')
const boxCooldown = document.getElementById('boxCooldown')

function effectiveProgress() { return serverProgress + pendingEnergy }
function effectiveEnergyBoxes() { return Math.floor((serverEnergy + pendingEnergy) / energyPerBox) }
function effectiveAvailable() { return Math.min(effectiveEnergyBoxes(), openAllowance) }

function updateEnergyUI() {
  const prog = effectiveProgress() % energyPerBox
  const pct = Math.min(100, (prog / energyPerBox) * 100)
  energyFill.style.width = pct + '%'
  energyLabel.textContent = prog + ' / ' + energyPerBox

  const canOpen = effectiveAvailable()
  const eBoxes = effectiveEnergyBoxes()

  boxBtn.classList.remove('ready', 'cooldown')
  if (canOpen > 0) {
    boxBtn.classList.add('ready')
    boxBtn.title = `开宝箱 (${canOpen})`
  } else if (eBoxes > 0 && openAllowance <= 0) {
    boxBtn.classList.add('cooldown')
    boxBtn.title = '冷却中...'
  } else {
    boxBtn.title = '能量不足'
  }

  if (eBoxes > 0) {
    boxBadge.textContent = String(eBoxes)
    boxBadge.style.display = 'flex'
    boxBadge.style.background = canOpen > 0 ? '#4caf50' : '#ff9800'
  } else {
    boxBadge.style.display = 'none'
  }
}

function startCooldownTick() {
  if (cooldownTickTimer) return
  cooldownTickTimer = setInterval(() => {
    if (nextOpenIn > 0) {
      nextOpenIn--
      const m = Math.floor(nextOpenIn / 60)
      const s = nextOpenIn % 60
      boxCooldown.textContent = `${m}:${String(s).padStart(2,'0')}`
      if (nextOpenIn <= 0) {
        openAllowance++
        boxCooldown.textContent = ''
        updateEnergyUI()
        clearInterval(cooldownTickTimer)
        cooldownTickTimer = null
      }
    } else {
      boxCooldown.textContent = ''
      clearInterval(cooldownTickTimer)
      cooldownTickTimer = null
    }
  }, 1000)
}

api.onEnergyUpdate((data) => {
  serverEnergy = data.energy
  serverProgress = data.progress
  energyPerBox = data.energy_per_box
  energyBoxes = data.energy_boxes ?? Math.floor(data.energy / data.energy_per_box)
  openAllowance = data.open_allowance ?? data.available_boxes
  nextOpenIn = data.next_open_in ?? 0
  pendingEnergy = 0
  updateEnergyUI()
  if (nextOpenIn > 0 && openAllowance <= 0) startCooldownTick()
})

api.onInputEvent((data) => {

    kbTotal++; kbEl.textContent = fmt(dailyKb + kbTotal)

  }
})

async function renderEquipment(equipped) {
  equipLayer.innerHTML = ''
  let hasKeyboard = false
  resetCatColor()

  for (const item of equipped) {
    if (item.slot === 'color' && item.svg_ref) {
      try {
        const svgText = await api.bongoGetItemSvg(item.svg_ref)
        if (svgText) {
          const match = svgText.match(/data-color="([^"]+)"/)
          if (match) applyCatColor(match[1])
        }
      } catch {}
      continue
    }
    if (item.slot === 'keyboard' && item.svg_ref) {
      try {
        const svgText = await api.bongoGetItemSvg(item.svg_ref)
        if (svgText && keyboardEl) {
          hasKeyboard = true
          keyboardEl.innerHTML = '<g transform="translate(6,119)">' +
            svgText
              .replace(/<\?xml[^?]*\?>/g, '')
              .replace(/<svg[^>]*>/, '')
              .replace(/<\/svg>/, '') +
            '</g>'
        }
      } catch {}
      continue
    }
    if (!item.svg_ref) continue
    try {
      const svgText = await api.bongoGetItemSvg(item.svg_ref)
      if (!svgText) continue
      const parser = new DOMParser()
      const doc = parser.parseFromString(svgText, 'image/svg+xml')
      const svgRoot = doc.documentElement
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g')
      g.setAttribute('class', 'equip-item equip-' + item.slot)
      while (svgRoot.firstChild) g.appendChild(svgRoot.firstChild)
      equipLayer.appendChild(g)
    } catch {}
  }

  if (!hasKeyboard && keyboardEl) resetDefaultKeyboard()
}

  const cat = friendCats.get(friendId)
  if (cat) { cat.el.remove(); friendCats.delete(friendId) }

function animateFriendCat(friendId, inputType) {
  const cat = friendCats.get(friendId)
  if (!cat) return
  const svg = cat.el.querySelector('.friend-cat-svg')

  if (inputType === 'keyboard') {
    const side = cat.pawSide
    cat.pawSide = side === 'left' ? 'right' : 'left'
    const paw = svg.querySelector(`[data-el="paw${side === 'left' ? 'L' : 'R'}"]`)
    if (paw) { paw.classList.add('tap'); setTimeout(() => paw.classList.remove('tap'), 120) }
    svg.classList.add('bounce')
    setTimeout(() => svg.classList.remove('bounce'), 120)
  } else {
    const earL = svg.querySelector('[data-el="earL"]')
    const earR = svg.querySelector('[data-el="earR"]')
    if (earL) { earL.classList.add('wiggle'); setTimeout(() => earL.classList.remove('wiggle'), 160) }
    if (earR) { earR.classList.add('wiggle'); setTimeout(() => earR.classList.remove('wiggle'), 160) }
  }
}

/* ══ Animation State Machine ══ */
let catState = 'idle'
let lastInputTime = Date.now()
let recentKeys = [] // timestamps of recent keystrokes
const SLEEPY_MS = 30000
const SLEEPING_MS = 60000
const IDLE_MS = 5000
const FAST_THRESHOLD = 5 // keys per second

function setCatState(state) {
  if (catState === state) return
  catState = state
  wrapper.className = 'cat-wrapper cat-state-' + state
}

function recordKeyInput() {
  const now = Date.now()
  lastInputTime = now
  recentKeys.push(now)
  recentKeys = recentKeys.filter(t => now - t < 2000)
  const keysPerSec = recentKeys.length / 2
  if (keysPerSec >= FAST_THRESHOLD) setCatState('fast')
  else setCatState('typing')
}

function recordMouseInput() {
  lastInputTime = Date.now()
  if (catState === 'sleepy' || catState === 'sleeping') setCatState('idle')
}

setInterval(() => {
  const elapsed = Date.now() - lastInputTime
  if (catState === 'typing' || catState === 'fast') {
    if (elapsed > IDLE_MS) setCatState('idle')
    else if (catState === 'fast') {
      const now = Date.now()
      recentKeys = recentKeys.filter(t => now - t < 2000)
      if (recentKeys.length / 2 < 3) setCatState('typing')
    }
  } else if (catState === 'idle') {
    if (elapsed > SLEEPING_MS) setCatState('sleeping')
    else if (elapsed > SLEEPY_MS) setCatState('sleepy')
  } else if (catState === 'sleepy' && elapsed > SLEEPING_MS) {
    setCatState('sleeping')
  }
}, 1000)

// Blink animation (random interval 3-6s)
function scheduleBlink() {
  const delay = 3000 + Math.random() * 3000
  setTimeout(() => {
    if (catState !== 'sleeping' && catState !== 'sleepy') {
      eyeL.style.transition = 'ry 0.08s'; eyeR.style.transition = 'ry 0.08s'
      eyeL.setAttribute('ry', '1'); eyeR.setAttribute('ry', '1')
      setTimeout(() => {
        eyeL.setAttribute('ry', '7'); eyeR.setAttribute('ry', '7')
        eyeL.style.transition = ''; eyeR.style.transition = ''
      }, 120)
    }
    scheduleBlink()
  }, delay)
}
scheduleBlink()

          banner.style.background = 'linear-gradient(135deg, #4fc3f7, #7c4dff)'
          banner.style.color = '#fff'
          banner.textContent = '\uD83D\uDD13 解锁 「' + label + '」'
          document.body.appendChild(banner)
          setTimeout(() => banner.remove(), 3500)
        }
        updateOverlayVisibility()
      }
      break
  }
})
</script>
</body>
</html>
