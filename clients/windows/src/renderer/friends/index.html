<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
<title>好友</title>
<style>
:root {
  --bg: #141414; --card: #1e1e1e; --border: #333;
  --text: #e0e0e0; --text2: #888;
  --accent: #4fc3f7; --danger: #ef5350; --success: #66bb6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', sans-serif; padding: 16px;
}

/* Header */
.header { margin-bottom: 16px; }
.header h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.my-code {
  display: inline-block; padding: 4px 12px; border-radius: 6px;
  background: #252525; color: var(--accent); font-size: 14px;
  font-weight: 700; letter-spacing: 1px; cursor: pointer;
  border: 1px solid var(--border);
}
.my-code:hover { background: #333; }
.copied { color: var(--success) !important; }

/* Add friend form */
.add-form {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.add-input {
  flex: 1; padding: 8px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: #1e1e1e;
  color: var(--text); font-size: 13px; font-family: inherit;
  outline: none;
}
.add-input:focus { border-color: var(--accent); }
.add-input::placeholder { color: var(--text2); }
.add-btn {
  padding: 8px 16px; border-radius: 6px; border: none;
  background: var(--accent); color: #000; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit;
}
.add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.add-error { color: var(--danger); font-size: 12px; margin-top: 4px; }
.add-success { color: var(--success); font-size: 12px; margin-top: 4px; }

/* Friends list */
.friend-list { display: flex; flex-direction: column; gap: 8px; }

.friend-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; cursor: pointer;
  transition: all 0.15s;
}
.friend-card:hover { border-color: #555; transform: translateY(-1px); }

.friend-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; position: relative; flex-shrink: 0;
}
.online-dot {
  position: absolute; bottom: 2px; right: 2px;
  width: 10px; height: 10px; border-radius: 50%;
  border: 2px solid var(--card);
}
.online-dot.online { background: var(--success); }
.online-dot.offline { background: #666; }

.friend-info { flex: 1; min-width: 0; }
.friend-name {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.friend-code { font-size: 11px; color: var(--text2); }
.friend-status { font-size: 11px; margin-top: 2px; }
.friend-status.online { color: var(--success); }
.friend-status.offline { color: var(--text2); }

.friend-equip {
  display: flex; gap: 3px; flex-shrink: 0;
}
.equip-badge {
  font-size: 14px; width: 22px; height: 22px; text-align: center;
  line-height: 22px; border-radius: 4px; background: #252525;
}

.friend-actions { flex-shrink: 0; }
.remove-btn {
  padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--danger); font-size: 11px;
  cursor: pointer; font-family: inherit;
}
.remove-btn:hover { background: rgba(239,83,80,0.1); border-color: var(--danger); }

/* Interaction buttons */
.interact-btns {
  display: flex; gap: 4px; flex-shrink: 0;
}
.interact-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: #252525; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.interact-btn:hover { background: #333; border-color: #555; }
.interact-btn:active { transform: scale(0.95); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.tab-btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 13px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: #252525; }
.tab-btn.active { background: var(--card); color: var(--accent); border-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Leaderboard */
.leaderboard-sub-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.leaderboard-sub-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: #252525; color: var(--text2); font-size: 12px;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.leaderboard-sub-btn:hover { color: var(--text); background: #333; }
.leaderboard-sub-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.leaderboard-list { display: flex; flex-direction: column; gap: 6px; }
.leaderboard-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
}
.leaderboard-rank {
  width: 28px; font-weight: 700; color: var(--accent); font-size: 14px;
}
.leaderboard-rank.gold { color: #ffd700; }
.leaderboard-rank.silver { color: #c0c0c0; }
.leaderboard-rank.bronze { color: #cd7f32; }
.leaderboard-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.leaderboard-name { flex: 1; font-size: 13px; font-weight: 600; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.leaderboard-stat { font-size: 12px; color: var(--text2); min-width: 50px; text-align: right; }
.leaderboard-stat.total { color: var(--accent); font-weight: 600; min-width: 60px; }

/* Friend profile overlay */
.profile-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.profile-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; width: 320px;
  text-align: center;
}
.profile-cat { font-size: 64px; margin-bottom: 8px; }
.profile-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.profile-code { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.profile-stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 12px; }
.profile-stat { text-align: center; }
.profile-stat-val { font-size: 18px; font-weight: 700; color: var(--accent); }
.profile-stat-label { font-size: 11px; color: var(--text2); }
.profile-equip-list { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.profile-equip-item {
  padding: 4px 10px; border-radius: 4px; background: #252525;
  font-size: 11px; color: var(--text);
}
.profile-close {
  padding: 6px 24px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer; font-family: inherit;
}
.profile-close:hover { background: #333; }

/* Empty state */
.empty { text-align: center; color: var(--text2); padding: 40px; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>好友</h1>
  <div style="margin-top: 6px; display: flex; align-items: center; gap: 8px;">
    <span style="color: var(--text2); font-size: 12px;">我的好友码:</span>
    <span class="my-code" id="myCode" title="点击复制">--</span>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="friends">好友列表</button>
  <button class="tab-btn" data-tab="leaderboard">排行榜</button>
</div>

<div id="friendsPanel" class="tab-panel active">
  <div class="add-form">
    <input class="add-input" id="addInput" type="text" placeholder="输入好友码，如 MEOW-A3F7" maxlength="9">
    <button class="add-btn" id="addBtn">添加</button>
  </div>
  <div id="addMsg"></div>
  <div class="friend-list" id="friendList"></div>
</div>

<div id="leaderboardPanel" class="tab-panel">
  <div class="leaderboard-sub-tabs">
    <button class="leaderboard-sub-btn active" data-type="daily">今日</button>
    <button class="leaderboard-sub-btn" data-type="weekly">本周</button>
  </div>
  <div class="leaderboard-list" id="leaderboardList"></div>
</div>

<script>
const api = window.heartbeatAPI

const categoryIcons = {
  hat: '🎩', glasses: '👓', scarf: '🧣', accessory: '✨', color: '🎨', keyboard: '⌨️'
}

let friends = []

async function init() {
  const cfg = await api.getConfig()
  const codeEl = document.getElementById('myCode')
  codeEl.textContent = cfg.friendCode || '未注册'

  codeEl.addEventListener('click', async () => {
    if (!cfg.friendCode) return
    await navigator.clipboard.writeText(cfg.friendCode)
    codeEl.classList.add('copied')
    codeEl.textContent = '已复制!'
    setTimeout(() => {
      codeEl.classList.remove('copied')
      codeEl.textContent = cfg.friendCode
    }, 1500)
  })

  await loadFriends()

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      const tab = btn.dataset.tab
      document.getElementById(tab === 'friends' ? 'friendsPanel' : 'leaderboardPanel').classList.add('active')
      if (tab === 'leaderboard') loadLeaderboard('daily')
    })
  })

  document.querySelectorAll('.leaderboard-sub-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.leaderboard-sub-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      loadLeaderboard(btn.dataset.type)
    })
  })
}

async function loadLeaderboard(type) {
  const listEl = document.getElementById('leaderboardList')
  listEl.innerHTML = '<div class="empty">加载中...</div>'
  try {
    const data = type === 'daily'
      ? await api.bongoGetLeaderboardDaily()
      : await api.bongoGetLeaderboardWeekly()
    const rows = data?.rows || data || []
    if (rows.length === 0) {
      listEl.innerHTML = '<div class="empty">暂无排行数据</div>'
      return
    }
    listEl.innerHTML = rows.map((r, i) => {
      const rank = i + 1
      const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : ''
      const kb = r.keyboard_count ?? r.keyboardCount ?? 0
      const mouse = r.mouse_count ?? r.mouseCount ?? 0
      const total = (r.total ?? (kb + mouse))
      const name = r.display_name ?? r.displayName ?? '--'
      const color = r.cat_color ?? r.catColor ?? '#666'
      return `
        <div class="leaderboard-row">
          <span class="leaderboard-rank ${rankClass}">${rank}</span>
          <span class="leaderboard-dot" style="background:${color}"></span>
          <span class="leaderboard-name">${esc(name)}</span>
          <span class="leaderboard-stat">⌨️ ${kb}</span>
          <span class="leaderboard-stat">🖱️ ${mouse}</span>
          <span class="leaderboard-stat total">${total}</span>
        </div>
      `
    }).join('')
  } catch (err) {
    console.warn('load leaderboard failed:', err)
    listEl.innerHTML = '<div class="empty">加载失败</div>'
  }
}

async function loadFriends() {
  try {
    friends = await api.bongoGetFriends() || []
  } catch (err) {
    console.warn('load friends failed:', err)
    friends = []
  }
  renderFriends()
}

function renderFriends() {
  const el = document.getElementById('friendList')
  if (friends.length === 0) {
    el.innerHTML = '<div class="empty">还没有好友，分享你的好友码邀请朋友加入吧！</div>'
    return
  }

  el.innerHTML = friends.map(f => {
    const equipBadges = (f.equipped || []).map(e => {
      const icon = categoryIcons[e.category] || '❓'
      return `<span class="equip-badge" title="${esc(e.name)}">${icon}</span>`
    }).join('')

    const statusClass = f.online ? 'online' : 'offline'
    const statusText = f.online ? '在线' : formatLastSeen(f.last_seen)

    return `
      <div class="friend-card" data-friend-id="${f.id}">
        <div class="friend-avatar" style="background: ${f.cat_color || '#f5f5f5'}; border-radius: 50%;">
          🐱
          <span class="online-dot ${statusClass}"></span>
        </div>
        <div class="friend-info">
          <div class="friend-name">${esc(f.display_name)}</div>
          <div class="friend-code">${f.friend_code}</div>
          <div class="friend-status ${statusClass}">${statusText}</div>
          <div class="interact-btns">
            <button class="interact-btn" data-friend-id="${f.id}" data-action="fish" title="扔鱼">🐟</button>
            <button class="interact-btn" data-friend-id="${f.id}" data-action="pet" title="摸摸">🤚</button>
            <button class="interact-btn" data-friend-id="${f.id}" data-action="gift" title="送礼">🎁</button>
          </div>
        </div>
        <div class="friend-equip">${equipBadges}</div>
        <div class="friend-actions">
          <button class="remove-btn" data-remove="${f.id}" title="删除好友">删除</button>
        </div>
      </div>
    `
  }).join('')

  el.querySelectorAll('.friend-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.remove-btn') || e.target.closest('.interact-btns')) return
      showFriendProfile(card.dataset.friendId)
    })
  })

  el.querySelectorAll('.interact-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation()
      const friendId = btn.dataset.friendId
      const action = btn.dataset.action
      if (action === 'gift') {
        alert('送礼需要先选择要送的物品')
        return
      }
      try {
        await api.bongoSendInteraction(friendId, action)
      } catch (err) {
        console.warn('send interaction failed:', err)
      }
    })
  })

  el.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation()
      const friendId = btn.dataset.remove
      const friend = friends.find(f => f.id === friendId)
      if (!confirm(`确定删除好友 ${friend?.display_name || ''} 吗？`)) return
      try {
        await api.bongoRemoveFriend(friendId)
        await loadFriends()
      } catch (err) {
        console.warn('remove friend failed:', err)
      }
    })
  })
}

function formatLastSeen(ts) {
  if (!ts) return '从未上线'
  const now = Math.floor(Date.now() / 1000)
  const diff = now - ts
  if (diff < 60) return '刚刚'
  if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前'
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前'
  return Math.floor(diff / 86400) + ' 天前'
}

function esc(s) {
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

// Add friend
document.getElementById('addBtn').addEventListener('click', async () => {
  const input = document.getElementById('addInput')
  const msgEl = document.getElementById('addMsg')
  const code = input.value.trim().toUpperCase()
  if (!code) return

  msgEl.innerHTML = ''
  try {
    await api.bongoAddFriend(code)
    msgEl.innerHTML = '<div class="add-success">添加成功！</div>'
    input.value = ''
    await loadFriends()
    setTimeout(() => { msgEl.innerHTML = '' }, 3000)
  } catch (err) {
    const msg = (err.message || '').includes('404') ? '好友码不存在'
      : (err.message || '').includes('Already') ? '已经是好友了'
      : (err.message || '').includes('yourself') ? '不能添加自己'
      : '添加失败: ' + err.message
    msgEl.innerHTML = `<div class="add-error">${esc(msg)}</div>`
  }
})

document.getElementById('addInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('addBtn').click()
})

// Friend profile overlay
async function showFriendProfile(friendId) {
  try {
    const profile = await api.bongoGetFriendProfile(friendId)
    if (!profile) return

    const overlay = document.createElement('div')
    overlay.className = 'profile-overlay'

    const equipItems = (profile.equipped || []).map(e => {
      const icon = categoryIcons[e.category] || '❓'
      return `<span class="profile-equip-item">${icon} ${esc(e.name)}</span>`
    }).join('')

    const statusClass = profile.online ? 'online' : 'offline'
    const statusText = profile.online ? '在线' : formatLastSeen(profile.last_seen)

    overlay.innerHTML = `
      <div class="profile-card">
        <div class="profile-cat">🐱</div>
        <div class="profile-name">${esc(profile.user.display_name)}</div>
        <div class="profile-code">${profile.user.friend_code}</div>
        <div class="friend-status ${statusClass}" style="margin-bottom: 12px">${statusText}</div>
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-val">${profile.boxes_opened}</div>
            <div class="profile-stat-label">宝箱已开</div>
          </div>
        </div>
        ${equipItems ? '<div class="profile-equip-list">' + equipItems + '</div>' : '<div style="color:var(--text2);font-size:12px;margin-bottom:12px">还没有装扮</div>'}
        <button class="profile-close">关闭</button>
      </div>
    `

    overlay.querySelector('.profile-close').addEventListener('click', () => overlay.remove())
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove()
    })
    document.body.appendChild(overlay)
  } catch (err) {
    console.warn('load friend profile failed:', err)
  }
}

init()
</script>
</body>
</html>
