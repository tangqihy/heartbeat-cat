<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 34" data-keyboard="true">
  <!-- Piano keyboard -->
  <rect x="0" y="0" width="168" height="34" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
  <!-- White keys -->
  <g fill="#f8f8f0" stroke="#ddd" stroke-width="0.4">
    <rect x="4" y="3" width="10" height="28" rx="1"/><rect x="16" y="3" width="10" height="28" rx="1"/>
    <rect x="28" y="3" width="10" height="28" rx="1"/><rect x="40" y="3" width="10" height="28" rx="1"/>
    <rect x="52" y="3" width="10" height="28" rx="1"/><rect x="64" y="3" width="10" height="28" rx="1"/>
    <rect x="76" y="3" width="10" height="28" rx="1"/><rect x="88" y="3" width="10" height="28" rx="1"/>
    <rect x="100" y="3" width="10" height="28" rx="1"/><rect x="112" y="3" width="10" height="28" rx="1"/>
    <rect x="124" y="3" width="10" height="28" rx="1"/><rect x="136" y="3" width="10" height="28" rx="1"/>
    <rect x="148" y="3" width="10" height="28" rx="1"/>
  </g>
  <!-- Black keys -->
  <g fill="#222" stroke="#111" stroke-width="0.3">
    <rect x="11" y="3" width="8" height="17" rx="1"/><rect x="23" y="3" width="8" height="17" rx="1"/>
    <rect x="47" y="3" width="8" height="17" rx="1"/><rect x="59" y="3" width="8" height="17" rx="1"/>
    <rect x="71" y="3" width="8" height="17" rx="1"/>
    <rect x="95" y="3" width="8" height="17" rx="1"/><rect x="107" y="3" width="8" height="17" rx="1"/>
    <rect x="131" y="3" width="8" height="17" rx="1"/><rect x="143" y="3" width="8" height="17" rx="1"/>
    <rect x="155" y="3" width="8" height="17" rx="1"/>
  </g>
  <!-- Subtle shine on white keys -->
  <g fill="rgba(255,255,255,0.15)">
    <rect x="4" y="3" width="10" height="3" rx="1"/><rect x="40" y="3" width="10" height="3" rx="1"/>
    <rect x="76" y="3" width="10" height="3" rx="1"/><rect x="112" y="3" width="10" height="3" rx="1"/>
