<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -5 220 165">
  <!-- Monocle on right eye with chain -->
  <g fill="none" stroke="#3d3d3d" stroke-width="1.5">
    <!-- Monocle circle (right eye) -->
    <circle cx="110" cy="68" r="12"/>
    <!-- Chain - decorative links -->
    <path d="M 110 80 Q 110 90, 105 95 Q 100 100, 95 100" stroke="#5c4033"/>
    <circle cx="95" cy="100" r="3" fill="#8B7355" stroke="#5c4033"/>
  </g>
</svg>
