  <defs>
    <radialGradient id="cosmosLens" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="30%" style="stop-color:#aa88ff"/>
      <stop offset="70%" style="stop-color:#4400aa"/>
      <stop offset="100%" style="stop-color:#110033"/>
    </radialGradient>
    <linearGradient id="cosmosFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ff69b4"/>
