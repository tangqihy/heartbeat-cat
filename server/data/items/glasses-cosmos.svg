    <circle cx="64" cy="64" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="104" cy="64" r="1.5" fill="#fff" opacity="0.8"/>
    <circle cx="75" cy="72" r="1" fill="#ffd700" opacity="0.6"/>
    <circle cx="115" cy="72" r="1" fill="#ffd700" opacity="0.6"/>
  </g>
