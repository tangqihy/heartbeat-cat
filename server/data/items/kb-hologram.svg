    </linearGradient>
    <linearGradient id="holoEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="50%" stop-color="#00bfff"/>
      <stop offset="100%" stop-color="#ff69b4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="168" height="34" rx="3" fill="url(#holoGrad)" stroke="url(#holoEdge)" stroke-width="1"/>
