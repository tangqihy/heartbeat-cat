      <stop offset="0%" stop-color="#ff44aa" stop-opacity="0.3"/>
      <stop offset="33%" stop-color="#44aaff" stop-opacity="0.3"/>
      <stop offset="66%" stop-color="#44ffaa" stop-opacity="0.3"/>
