<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -5 220 165">
  <!-- Mythic dragon wings -->
  <defs>
    <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2244"/>
      <stop offset="50%" style="stop-color:#cc0033"/>
      <stop offset="100%" style="stop-color:#880022"/>
    </linearGradient>
  </defs>
  <!-- Left wing -->
  <path d="M 80 75 Q 30 40, 5 20 Q 15 50, 20 70 Q 25 55, 35 45 Q 40 65, 50 75 Q 55 60, 65 55 Q 68 70, 80 75 Z"
        fill="url(#dragonGrad)" stroke="#660011" stroke-width="1"/>
  <!-- Right wing -->
  <path d="M 100 75 Q 150 40, 175 20 Q 165 50, 160 70 Q 155 55, 145 45 Q 140 65, 130 75 Q 125 60, 115 55 Q 112 70, 100 75 Z"
        fill="url(#dragonGrad)" stroke="#660011" stroke-width="1"/>
  <!-- Wing membrane lines -->
  <path d="M 80 75 L 20 35" stroke="#aa0022" stroke-width="0.5" opacity="0.5" fill="none"/>
  <path d="M 80 75 L 40 50" stroke="#aa0022" stroke-width="0.5" opacity="0.5" fill="none"/>
  <path d="M 100 75 L 160 35" stroke="#aa0022" stroke-width="0.5" opacity="0.5" fill="none"/>
  <path d="M 100 75 L 140 50" stroke="#aa0022" stroke-width="0.5" opacity="0.5" fill="none"/>
</svg>
