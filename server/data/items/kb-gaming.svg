<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 34" data-keyboard="true">
  <!-- RGB gaming keyboard with color accents -->
  <rect x="0" y="0" width="168" height="34" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="0.8"/>
  <rect x="2" y="1.5" width="164" height="30" rx="2" fill="#111"/>
  <!-- RGB underglow -->
  <rect x="3" y="30" width="162" height="2" rx="1" fill="url(#rgbGrad)"/>
  <defs><linearGradient id="rgbGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff0040"/><stop offset="25%" stop-color="#ff8000"/>
    <stop offset="50%" stop-color="#00ff80"/><stop offset="75%" stop-color="#0080ff"/>
    <stop offset="100%" stop-color="#c040ff"/>
  </linearGradient></defs>
  <!-- Row 1 -->
  <g fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.3">
    <rect x="6" y="4" width="10" height="6.5" rx="1"/><rect x="18" y="4" width="10" height="6.5" rx="1"/>
    <rect x="30" y="4" width="10" height="6.5" rx="1"/><rect x="42" y="4" width="10" height="6.5" rx="1"/>
    <rect x="54" y="4" width="10" height="6.5" rx="1"/><rect x="66" y="4" width="10" height="6.5" rx="1"/>
    <rect x="78" y="4" width="10" height="6.5" rx="1"/><rect x="90" y="4" width="10" height="6.5" rx="1"/>
    <rect x="102" y="4" width="10" height="6.5" rx="1"/><rect x="114" y="4" width="10" height="6.5" rx="1"/>
    <rect x="126" y="4" width="10" height="6.5" rx="1"/><rect x="138" y="4" width="22" height="6.5" rx="1"/>
  </g>
  <!-- WASD highlight -->
  <g fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.3">
    <rect x="6" y="12.5" width="14" height="6.5" rx="1"/>
    <rect x="22" y="12.5" width="10" height="6.5" rx="1" fill="#330011" stroke="#ff0040" stroke-width="0.5"/>
    <rect x="34" y="12.5" width="10" height="6.5" rx="1"/><rect x="46" y="12.5" width="10" height="6.5" rx="1"/>
    <rect x="58" y="12.5" width="10" height="6.5" rx="1"/><rect x="70" y="12.5" width="10" height="6.5" rx="1"/>
    <rect x="82" y="12.5" width="10" height="6.5" rx="1"/><rect x="94" y="12.5" width="10" height="6.5" rx="1"/>
    <rect x="106" y="12.5" width="10" height="6.5" rx="1"/><rect x="118" y="12.5" width="10" height="6.5" rx="1"/>
    <rect x="130" y="12.5" width="30" height="6.5" rx="1"/>
  </g>
  <g fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.3">
    <rect x="6" y="21" width="18" height="6.5" rx="1"/>
    <rect x="26" y="21" width="10" height="6.5" rx="1" fill="#110033" stroke="#0080ff" stroke-width="0.5"/>
    <rect x="38" y="21" width="10" height="6.5" rx="1" fill="#001133" stroke="#00ff80" stroke-width="0.5"/>
    <rect x="50" y="21" width="10" height="6.5" rx="1" fill="#110033" stroke="#0080ff" stroke-width="0.5"/>
    <rect x="62" y="21" width="50" height="6.5" rx="1"/>
    <rect x="114" y="21" width="10" height="6.5" rx="1"/><rect x="126" y="21" width="10" height="6.5" rx="1"/>
    <rect x="138" y="21" width="22" height="6.5" rx="1"/>
  </g>
</svg>
