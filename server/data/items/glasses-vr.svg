<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -5 220 165">
  <!-- VR headset covering the eyes area -->
  <defs>
    <linearGradient id="vrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#2a2a2a"/>
    </linearGradient>
  </defs>
  <g fill="url(#vrGrad)" stroke="#1a1a1a" stroke-width="1">
    <!-- Main headset body -->
    <rect x="45" y="50" width="90" height="38" rx="4"/>
    <!-- Left eye hole (lens) -->
    <circle cx="70" cy="68" r="12" fill="#0a0a0a"/>
    <!-- Right eye hole (lens) -->
    <circle cx="110" cy="68" r="12" fill="#0a0a0a"/>
    <!-- Head strap left -->
    <rect x="40" y="58" width="15" height="22" rx="2"/>
    <!-- Head strap right -->
    <rect x="125" y="58" width="15" height="22" rx="2"/>
  </g>
</svg>
